
name: Script Runner

on:
  workflow_dispatch:
    inputs:
      script:
        description: Legacy direct bash fallback
        required: false
        type: string
      server_id:
        description: Target server UUID
        required: false
        type: string
      bootstrap_script_rpc:
        description: RPC name used to fetch bootstrap bash
        required: false
        type: string
      callback_token:
        description: Bootstrap callback token
        required: false
        type: string
      supabase_url:
        description: Supabase project URL
        required: false
        type: string
      supabase_anon_key:
        description: Supabase anon key
        required: false
        type: string
      ssh_target:
        description: Optional user@host:port target hint
        required: false
        type: string
      ssh_host:
        description: SSH host
        required: false
        type: string
      ssh_port:
        description: SSH port
        required: false
        type: string
      ssh_user:
        description: SSH username
        required: false
        type: string
      ssh_password:
        description: SSH password
        required: false
        type: string
      bootstrap_log_path:
        description: Optional remote bootstrap log path
        required: false
        type: string

concurrency:
  group: script-runner-${{ inputs.server_id != '' && inputs.server_id || github.run_id }}
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LEGACY_SCRIPT: ${{ inputs.script }}
      SERVER_ID: ${{ inputs.server_id }}
      BOOTSTRAP_SCRIPT_RPC: ${{ inputs.bootstrap_script_rpc }}
      CALLBACK_TOKEN: ${{ inputs.callback_token }}
      SUPABASE_URL: ${{ inputs.supabase_url }}
      SUPABASE_ANON_KEY: ${{ inputs.supabase_anon_key }}
      SSH_TARGET: ${{ inputs.ssh_target }}
      SSH_HOST: ${{ inputs.ssh_host }}
      SSH_PORT: ${{ inputs.ssh_port }}
      SSH_USER: ${{ inputs.ssh_user }}
      SSH_PASSWORD: ${{ inputs.ssh_password }}
      BOOTSTRAP_LOG_PATH: ${{ inputs.bootstrap_log_path }}
    steps:
      - name: Select execution mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${LEGACY_SCRIPT}" ]]; then
            printf 'mode=legacy\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for name in SERVER_ID BOOTSTRAP_SCRIPT_RPC CALLBACK_TOKEN SUPABASE_URL SUPABASE_ANON_KEY SSH_HOST SSH_USER SSH_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              printf 'missing required input: %s\n' "$name" >&2
              exit 1
            fi
          done

          if [[ -z "${SSH_PORT:-}" ]]; then
            printf 'SSH_PORT=22\n' >> "$GITHUB_ENV"
          fi

          printf 'mode=bootstrap\n' >> "$GITHUB_OUTPUT"

      - name: Legacy direct bash fallback
        if: steps.mode.outputs.mode == 'legacy'
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -lc "$LEGACY_SCRIPT"

      - name: Install workflow dependencies
        if: steps.mode.outputs.mode == 'bootstrap'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Fetch bootstrap bash
        if: steps.mode.outputs.mode == 'bootstrap'
        shell: bash
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          payload="$(python3 -c 'import json, os; print(json.dumps({"p_server_id": os.environ["SERVER_ID"], "p_callback_token": os.environ["CALLBACK_TOKEN"]}))')"

          http_code="$(curl -sS -o "$response_file" -w '%{http_code}' \
            "$SUPABASE_URL/rest/v1/rpc/$BOOTSTRAP_SCRIPT_RPC" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")"

          if [[ "$http_code" != "200" ]]; then
            printf 'bootstrap_script_rpc_failed http=%s\n' "$http_code" >&2
            python3 -c 'import pathlib, sys; print(pathlib.Path(sys.argv[1]).read_text(), end="")' "$response_file" >&2
            exit 1
          fi

          python3 -c 'import json, pathlib, sys; raw = pathlib.Path(sys.argv[1]).read_text(); value = json.loads(raw); assert isinstance(value, str) and value.strip(), "bootstrap script rpc did not return non-empty bash text"; print(value, end="")' "$response_file" > bootstrap.sh
          chmod +x bootstrap.sh

      - name: Run bootstrap bash over SSH
        if: steps.mode.outputs.mode == 'bootstrap'
        shell: bash
        run: |
          set -euo pipefail

          remote_script="/tmp/gomtm-bootstrap-${SERVER_ID}.sh"

          sshpass -p "$SSH_PASSWORD" scp \
            -P "${SSH_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            bootstrap.sh "$SSH_USER@$SSH_HOST:$remote_script"

          sshpass -p "$SSH_PASSWORD" ssh \
            -p "${SSH_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$SSH_USER@$SSH_HOST" \
            "chmod +x '$remote_script' && bash '$remote_script'; exit_code=\$?; rm -f '$remote_script'; exit \$exit_code"
