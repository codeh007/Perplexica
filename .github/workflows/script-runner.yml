name: Script-Runner

on:
  workflow_dispatch:
    inputs:
      script:
        type: string
        required: true
      context:
        type: string
        required: true

jobs:
  run-script:
    name: Run Script
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass
        
      - name: Run Script
        id: run_script
        run: |
          set +e
          start_time=$(date +%s)
          
          script="${{ inputs.script }}"
          context="${{ inputs.context }}"
          
          # Execute script and capture output
          output=$(eval "$script" 2>&1)
          exit_code=$?
          
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          
          # Save results for callback
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          echo "duration=$duration" >> $GITHUB_OUTPUT
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          exit $exit_code
          
      - name: Callback on Success
        if: success()
        run: |
          context_json='${{ inputs.context }}'
          callback_url=$(echo "$context_json" | jq -r '.callback_url')
          anon_key=$(echo "$context_json" | jq -r '.anon_key')
          callback_token=$(echo "$context_json" | jq -r '.callback_token')
          
          if [ -n "$callback_url" ] && [ "$callback_url" != "null" ]; then
            curl -X POST "$callback_url" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $anon_key" \
              -H "apikey: $anon_key" \
              -d "{
                \"p_token\": \"$callback_token\",
                \"p_result\": {
                  \"status\": \"success\",
                  \"logs\": $(echo '${{ steps.run_script.outputs.output }}' | jq -Rs .),
                  \"duration\": ${{ steps.run_script.outputs.duration }},
                  \"context\": $context_json
                }
              }"
          fi
          
      - name: Callback on Failure
        if: failure()
        run: |
          context_json='${{ inputs.context }}'
          callback_url=$(echo "$context_json" | jq -r '.callback_url')
          anon_key=$(echo "$context_json" | jq -r '.anon_key')
          callback_token=$(echo "$context_json" | jq -r '.callback_token')
          
          if [ -n "$callback_url" ] && [ "$callback_url" != "null" ]; then
            curl -X POST "$callback_url" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $anon_key" \
              -H "apikey: $anon_key" \
              -d "{
                \"p_token\": \"$callback_token\",
                \"p_result\": {
                  \"status\": \"failure\",
                  \"logs\": $(echo '${{ steps.run_script.outputs.output }}' | jq -Rs .),
                  \"error\": \"Script execution failed with exit code ${{ steps.run_script.outputs.exit_code }}\",
                  \"duration\": ${{ steps.run_script.outputs.duration }},
                  \"context\": $context_json
                }
              }"
          fi
